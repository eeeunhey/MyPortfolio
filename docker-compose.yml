services:
  web:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"              # Vite 기본 포트
    volumes:
      - .:/app:delegated         # 로컬 코드 → 컨테이너
      - /app/node_modules        # node_modules는 컨테이너 전용 (충돌 방지)
      - npm-cache:/root/.npm     # npm 캐시를 볼륨으로 (재설치 속도 ↑)
    environment:
      # 파일 변경 감지(Windows/WSL/도커 Desktop에서 중요)
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      # 앱 코드에서 import.meta.env.VITE_* 로 접근할 값이 있으면 여기에 추가
      # - VITE_API_BASE=http://localhost:8000
      - NODE_ENV=development
    command: >
      sh -lc '
        corepack enable || true &&
        echo "🔧 Installing deps..." &&
        if [ -f package-lock.json ]; then
          npm ci --no-optional --prefer-offline;
        else
          npm install --no-optional --prefer-offline;
        fi &&
        echo "🚀 Starting dev server..." &&
        npm run dev -- --host 0.0.0.0 --port 5173 --strictPort
      '
    # 컨테이너 종료 시 로그만 남기고 꺼지는 문제 방지/정리
    init: true
    restart: unless-stopped

volumes:
  npm-cache:


