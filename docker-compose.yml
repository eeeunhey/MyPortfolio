services:
  web:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"        # Vite 기본 포트
    volumes:
      - .:/app:delegated   # 로컬 코드 -> 컨테이너 반영
      - /app/node_modules  # node_modules는 컨테이너 내부 전용(충돌 방지)
    environment:
      # 파일변경 감지 안정화
      - CHOKIDAR_USEPOLLING=true
      - VITE_FORCE_POLLING=true
      - NODE_ENV=development
      # 빌드 최적화 설정
      - VITE_OPTIMIZE_DEPS_INCLUDE=lucide-react
    command: >
      sh -lc "
        corepack enable &&
        echo '의존성 설치 시작...' &&
        if [ -f package-lock.json ]; then 
          npm cache clean --force &&
          npm ci --no-optional --prefer-offline; 
        else 
          npm cache clean --force &&
          npm install --no-optional --prefer-offline; 
        fi &&
        echo 'lucide-react 재빌드 시도...' &&
        npm rebuild lucide-react || echo 'lucide-react 재빌드 실패 (무시)' &&
        echo '개발 서버 시작...' &&
        npm run dev -- --host 0.0.0.0 --port 5173 --force
      "